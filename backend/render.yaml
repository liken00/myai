# Render.com Blueprint
# Deploys MY.AI Flask backend to a free-tier web service.

services:
  - type: web
    name: myai-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: POYO_API_KEY
        sync: false   # Set via Render dashboard
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11"
